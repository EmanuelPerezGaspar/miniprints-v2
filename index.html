<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MiniPrints — Inicio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    /* ── Variables ──────────────────────────────────── */
    :root {
      --primary: #22c55e;
      --font: 'Plus Jakarta Sans', sans-serif;
      --ease-out: cubic-bezier(0.23, 1, 0.32, 1);
      --ease-in-out: cubic-bezier(0.77, 0, 0.175, 1);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      font-family: var(--font);
      background: transparent;
      color: #f1f5f9;
    }

    /* ── Falling Pattern Background ─────────────── */
    .falling-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }
    .falling-bg-anim {
      position: absolute;
      inset: 0;
      background-color: #0a0f1a;
      background-image:
        radial-gradient(4px 100px at 0px 235px, #22c55e, transparent),
        radial-gradient(4px 100px at 300px 235px, #22c55e, transparent),
        radial-gradient(1.5px 1.5px at 150px 117.5px, #22c55e 100%, transparent 150%),
        radial-gradient(4px 100px at 0px 252px, #22c55e, transparent),
        radial-gradient(4px 100px at 300px 252px, #22c55e, transparent),
        radial-gradient(1.5px 1.5px at 150px 126px, #22c55e 100%, transparent 150%),
        radial-gradient(4px 100px at 0px 150px, #22c55e, transparent),
        radial-gradient(4px 100px at 300px 150px, #22c55e, transparent),
        radial-gradient(1.5px 1.5px at 150px 75px, #22c55e 100%, transparent 150%),
        radial-gradient(4px 100px at 0px 253px, #22c55e, transparent),
        radial-gradient(4px 100px at 300px 253px, #22c55e, transparent),
        radial-gradient(1.5px 1.5px at 150px 126.5px, #22c55e 100%, transparent 150%),
        radial-gradient(4px 100px at 0px 204px, #22c55e, transparent),
        radial-gradient(4px 100px at 300px 204px, #22c55e, transparent),
        radial-gradient(1.5px 1.5px at 150px 102px, #22c55e 100%, transparent 150%),
        radial-gradient(4px 100px at 0px 134px, #22c55e, transparent),
        radial-gradient(4px 100px at 300px 134px, #22c55e, transparent),
        radial-gradient(1.5px 1.5px at 150px 67px, #22c55e 100%, transparent 150%),
        radial-gradient(4px 100px at 0px 179px, #22c55e, transparent),
        radial-gradient(4px 100px at 300px 179px, #22c55e, transparent),
        radial-gradient(1.5px 1.5px at 150px 89.5px, #22c55e 100%, transparent 150%),
        radial-gradient(4px 100px at 0px 299px, #22c55e, transparent),
        radial-gradient(4px 100px at 300px 299px, #22c55e, transparent),
        radial-gradient(1.5px 1.5px at 150px 149.5px, #22c55e 100%, transparent 150%),
        radial-gradient(4px 100px at 0px 215px, #22c55e, transparent),
        radial-gradient(4px 100px at 300px 215px, #22c55e, transparent),
        radial-gradient(1.5px 1.5px at 150px 107.5px, #22c55e 100%, transparent 150%),
        radial-gradient(4px 100px at 0px 281px, #22c55e, transparent),
        radial-gradient(4px 100px at 300px 281px, #22c55e, transparent),
        radial-gradient(1.5px 1.5px at 150px 140.5px, #22c55e 100%, transparent 150%),
        radial-gradient(4px 100px at 0px 158px, #22c55e, transparent),
        radial-gradient(4px 100px at 300px 158px, #22c55e, transparent),
        radial-gradient(1.5px 1.5px at 150px 79px, #22c55e 100%, transparent 150%),
        radial-gradient(4px 100px at 0px 210px, #22c55e, transparent),
        radial-gradient(4px 100px at 300px 210px, #22c55e, transparent),
        radial-gradient(1.5px 1.5px at 150px 105px, #22c55e 100%, transparent 150%);
      background-size:
        300px 235px, 300px 235px, 300px 235px,
        300px 252px, 300px 252px, 300px 252px,
        300px 150px, 300px 150px, 300px 150px,
        300px 253px, 300px 253px, 300px 253px,
        300px 204px, 300px 204px, 300px 204px,
        300px 134px, 300px 134px, 300px 134px,
        300px 179px, 300px 179px, 300px 179px,
        300px 299px, 300px 299px, 300px 299px,
        300px 215px, 300px 215px, 300px 215px,
        300px 281px, 300px 281px, 300px 281px,
        300px 158px, 300px 158px, 300px 158px,
        300px 210px, 300px 210px, 300px 210px;
      animation: fallingPattern 150s linear infinite;
    }
    .falling-bg-overlay {
      position: absolute;
      inset: 0;
      backdrop-filter: blur(1em);
      -webkit-backdrop-filter: blur(1em);
      background-image: radial-gradient(circle at 50% 50%, transparent 0, transparent 2px, #0a0f1a 2px);
      background-size: 8px 8px;
    }
    @keyframes fallingPattern {
      from {
        background-position:
          0px 220px, 3px 220px, 151.5px 337.5px,
          25px 24px, 28px 24px, 176.5px 150px,
          50px 16px, 53px 16px, 201.5px 91px,
          75px 224px, 78px 224px, 226.5px 230.5px,
          100px 19px, 103px 19px, 251.5px 121px,
          125px 120px, 128px 120px, 276.5px 187px,
          150px 31px, 153px 31px, 301.5px 120.5px,
          175px 235px, 178px 235px, 326.5px 384.5px,
          200px 121px, 203px 121px, 351.5px 228.5px,
          225px 224px, 228px 224px, 376.5px 364.5px,
          250px 26px, 253px 26px, 401.5px 105px,
          275px 75px, 278px 75px, 426.5px 180px;
      }
      to {
        background-position:
          0px 6800px, 3px 6800px, 151.5px 6917.5px,
          25px 13632px, 28px 13632px, 176.5px 13758px,
          50px 5416px, 53px 5416px, 201.5px 5491px,
          75px 17175px, 78px 17175px, 226.5px 17301.5px,
          100px 5119px, 103px 5119px, 251.5px 5221px,
          125px 8428px, 128px 8428px, 276.5px 8495px,
          150px 9876px, 153px 9876px, 301.5px 9965.5px,
          175px 13391px, 178px 13391px, 326.5px 13540.5px,
          200px 14741px, 203px 14741px, 351.5px 14848.5px,
          225px 18770px, 228px 18770px, 376.5px 18910.5px,
          250px 5082px, 253px 5082px, 401.5px 5161px,
          275px 6375px, 278px 6375px, 426.5px 6480px;
      }
    }

    /* ── Orbital container ──────────────────────────── */
    #orbital {
      position: fixed;
      inset: 0;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: default;
    }

    /* ── Orbit ring ─────────────────────────────────── */
    .orbit-ring {
      position: absolute;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.08);
      pointer-events: none;
    }

    /* ── Center orb ─────────────────────────────────── */
    #center-orb {
      position: absolute;
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: linear-gradient(135deg, #a78bfa, #3b82f6, #22c55e);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
      cursor: pointer;
    }
    #center-orb .ping1, #center-orb .ping2 {
      position: absolute;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.20);
      animation: ping 2s cubic-bezier(0,0,0.2,1) infinite;
      pointer-events: none;
    }
    #center-orb .ping1 { width: 90px;  height: 90px;  animation-delay: 0s; }
    #center-orb .ping2 { width: 110px; height: 110px; animation-delay: 0.6s; opacity: 0.6; }
    @keyframes ping {
      0%   { transform: scale(1);   opacity: 0.6; }
      80%  { transform: scale(1.2); opacity: 0; }
      100% { transform: scale(1.2); opacity: 0; }
    }
    #center-orb .inner {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #center-orb .inner svg { color: #0a0f1a; }

    /* Center label */
    #center-label {
      position: absolute;
      top: calc(50% + 52px);
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      pointer-events: none;
      z-index: 10;
    }
    #center-label .brand {
      font-size: 1.1rem;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: #fff;
      text-shadow: 0 1px 12px rgba(0,0,0,0.9), 0 0 24px rgba(0,0,0,0.7);
    }
    #center-label .brand em { color: #22c55e; font-style: normal; }
    #center-label .sub {
      font-size: 0.68rem;
      font-weight: 500;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.70);
      margin-top: 2px;
      text-shadow: 0 1px 8px rgba(0,0,0,0.9);
    }

    /* ── Nodes ──────────────────────────────────────── */
    .node {
      position: absolute;
      left: 50%;
      top: 50%;
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: pointer;
      will-change: transform, opacity;
    }

    /* Glow halo behind icon */
    .node-halo {
      position: absolute;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,255,255,0.18) 0%, transparent 70%);
      width: 70px; height: 70px;
      top: -15px; left: -15px;
      pointer-events: none;
      transition: opacity 300ms var(--ease-out);
      opacity: 0;
    }
    .node.pulsing .node-halo { opacity: 1; animation: pulse-halo 1s ease-in-out infinite; }
    @keyframes pulse-halo {
      0%, 100% { transform: scale(1);   opacity: 0.8; }
      50%       { transform: scale(1.3); opacity: 0.3; }
    }

    .node-icon {
      width: 42px; height: 42px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.35);
      background: rgba(0, 0, 0, 0.55);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(255,255,255,0.85);
      transition: transform 250ms var(--ease-out), background 200ms var(--ease-out),
                  border-color 200ms var(--ease-out), box-shadow 200ms var(--ease-out),
                  color 200ms var(--ease-out);
      position: relative;
      z-index: 2;
    }
    .node:hover .node-icon {
      border-color: rgba(255,255,255,0.70);
      background: rgba(255,255,255,0.12);
    }
    .node.active .node-icon {
      background: #ffffff;
      color: #0a0f1a;
      border-color: #ffffff;
      transform: scale(1.45);
      box-shadow: 0 0 24px rgba(255,255,255,0.35), 0 0 8px rgba(255,255,255,0.20);
    }

    .node-label {
      margin-top: 10px;
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: #ffffff;
      white-space: nowrap;
      transition: background 200ms var(--ease-out), border-color 200ms var(--ease-out),
                  transform 200ms var(--ease-out), color 200ms var(--ease-out);
      position: relative;
      z-index: 2;
      background: rgba(0, 0, 0, 0.82);
      padding: 3px 8px;
      border-radius: 99px;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.15);
    }
    .node:hover .node-label  { background: rgba(0,0,0,0.92); border-color: rgba(255,255,255,0.28); }
    .node.active .node-label { background: rgba(0,0,0,0.85); border-color: rgba(34,197,94,0.60); color: #ffffff; transform: scale(1.1); }

    /* ── Popup card ─────────────────────────────────── */
    .node-card {
      position: absolute;
      width: 200px;
      background: rgba(8, 12, 22, 0.88);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 14px;
      padding: 16px;
      box-shadow:
        0 16px 48px rgba(0,0,0,0.60),
        inset 0 1px 0 rgba(255,255,255,0.10);
      pointer-events: none;
      opacity: 0;
      transform: scale(0.88) translateY(6px);
      transition: opacity 250ms var(--ease-out), transform 250ms cubic-bezier(0.34, 1.2, 0.64, 1);
      z-index: 300;
    }
    .node-card.visible {
      opacity: 1;
      transform: scale(1) translateY(0);
      pointer-events: auto;
    }

    /* connector line from icon to card */
    .node-card::before {
      content: '';
      position: absolute;
      left: 50%;
      width: 1px;
      height: 14px;
      background: rgba(255,255,255,0.30);
    }
    .node-card.above::before { bottom: -14px; }
    .node-card.below::before { top:    -14px; }

    .card-title {
      font-size: 0.9rem;
      font-weight: 700;
      color: #f1f5f9;
      margin-bottom: 6px;
    }
    .card-desc {
      font-size: 0.78rem;
      color: rgba(255,255,255,0.50);
      line-height: 1.5;
      margin-bottom: 14px;
    }
    .card-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      width: 100%;
      padding: 8px 12px;
      background: #22c55e;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-family: var(--font);
      font-size: 0.8rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 180ms var(--ease-out), transform 160ms var(--ease-out);
      text-decoration: none;
    }
    .card-btn:hover  { background: #16a34a; }
    .card-btn:active { transform: scale(0.97); }

    /* ── Connection lines ───────────────────────────── */
    #connections-svg {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 1;
      overflow: visible;
    }

    /* ── Hint ───────────────────────────────────────── */
    #hint {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.72rem;
      color: rgba(255,255,255,0.70);
      letter-spacing: 0.8px;
      z-index: 5;
      pointer-events: none;
      background: rgba(0,0,0,0.50);
      padding: 4px 14px;
      border-radius: 99px;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      border: 1px solid rgba(255,255,255,0.08);
      white-space: nowrap;
    }

    @media (prefers-reduced-motion: reduce) {
      #bg { animation: none; }
      .node-card { transition: none; }
    }
    @media (max-width: 480px) {
      #center-orb { width: 56px; height: 56px; }
    }
  </style>
</head>
<body>

  <!-- Falling pattern background -->
  <style>
  #loom-bg {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    background: #0a0f1a;
  }
</style>
<canvas id="loom-bg" aria-hidden="true"></canvas>

  <!-- Orbital menu -->
  <div id="orbital" role="navigation" aria-label="Menú de navegación">

    <!-- SVG connection lines (drawn by JS) -->
    <svg id="connections-svg" aria-hidden="true"></svg>

    <!-- Orbit rings -->
    <div class="orbit-ring" style="width:400px; height:400px;" aria-hidden="true"></div>
    <div class="orbit-ring" style="width:500px; height:500px; border-color:rgba(255,255,255,0.04);" aria-hidden="true"></div>

    <!-- Center orb -->
    <div id="center-orb" title="MiniPrints" aria-label="MiniPrints inicio">
      <div class="ping1" aria-hidden="true"></div>
      <div class="ping2" aria-hidden="true"></div>
      <div class="inner">
        <svg width="20" height="20" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <rect x="5" y="10" width="18" height="13" rx="2" stroke="currentColor" stroke-width="2"/>
          <path d="M9 10V7a2 2 0 0 1 2-2h6a2 2 0 0 1 2 2v3" stroke="currentColor" stroke-width="2"/>
          <circle cx="8.5" cy="14.5" r="1.5" fill="currentColor"/>
          <rect x="9" y="18" width="10" height="1.5" rx="0.75" fill="currentColor"/>
        </svg>
      </div>
    </div>

    <!-- Brand label -->
    <div id="center-label" aria-hidden="true">
      <div class="brand">Mini<em>Prints</em></div>
      <div class="sub">Sistema de gestión</div>
    </div>

  </div>

  <!-- Hint -->
  <p id="hint">Haz clic en un nodo para navegar</p>

  <script>
    /* ── Pages data ───────────────────────────────────── */
    const pages = [
      {
        id: 1, title: 'Dashboard', url: 'dashboard.html',
        desc: 'Resumen ejecutivo con KPIs, ingresos, costos y alertas de stock.',
        icon: `<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>`,
      },
      {
        id: 2, title: 'Cotizador', url: 'cotizador.html',
        desc: 'Calcula el precio de impresión 3D: materiales, tiempo y margen.',
        icon: `<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="2" width="16" height="20" rx="2"/><line x1="8" y1="6" x2="16" y2="6"/><line x1="8" y1="10" x2="16" y2="10"/><line x1="8" y1="14" x2="12" y2="14"/></svg>`,
      },
      {
        id: 3, title: 'Stock Mat.', url: 'stock-material.html',
        desc: 'Inventario de filamentos por marca, tipo, color y precio/kg.',
        icon: `<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>`,
      },
      {
        id: 4, title: 'Stock Piezas', url: 'stock-piezas.html',
        desc: 'Piezas impresas disponibles para venta, con control de stock.',
        icon: `<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>`,
      },
      {
        id: 5, title: 'Ventas', url: 'ventas.html',
        desc: 'Registra ventas y descuenta automáticamente del inventario.',
        icon: `<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>`,
      },
      {
        id: 6, title: 'Finanzas', url: 'finanzas.html',
        desc: 'Ingresos, costos, márgenes y ganancias esperadas vs reales.',
        icon: `<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>`,
      },
    ];

    /* ── State ────────────────────────────────────────── */
    let rotationAngle = 0;
    let autoRotate    = true;
    let activeId      = null;
    let rafId         = null;
    let lastTime      = null;
    const SPEED_DEG_PER_SEC = 8; // degrees per second
    const RADIUS = 180;

    /* ── Build DOM ────────────────────────────────────── */
    const container = document.getElementById('orbital');
    const svg       = document.getElementById('connections-svg');
    const nodeEls   = {};

    pages.forEach(page => {
      const wrap = document.createElement('div');
      wrap.className = 'node';
      wrap.setAttribute('role', 'menuitem');
      wrap.setAttribute('aria-label', page.title);
      wrap.dataset.id = page.id;

      wrap.innerHTML = `
        <div class="node-halo"></div>
        <div class="node-icon">${page.icon}</div>
        <div class="node-label">${page.title}</div>
        <div class="node-card" role="tooltip">
          <div class="card-title">${page.title}</div>
          <div class="card-desc">${page.desc}</div>
          <a class="card-btn" href="${page.url}">
            Abrir
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
          </a>
        </div>
      `;

      wrap.addEventListener('click', e => { e.stopPropagation(); toggleNode(page.id); });
      container.appendChild(wrap);
      nodeEls[page.id] = wrap;
    });

    /* ── Toggle node ─────────────────────────────────── */
    function toggleNode(id) {
      if (activeId === id) {
        closeAll();
        return;
      }
      // Close previous
      if (activeId !== null) {
        nodeEls[activeId].classList.remove('active', 'pulsing');
        nodeEls[activeId].querySelector('.node-card').classList.remove('visible');
      }
      activeId = id;
      autoRotate = false;

      const el   = nodeEls[id];
      const card = el.querySelector('.node-card');
      el.classList.add('active');

      // Position card above or below based on current y
      const idx = pages.findIndex(p => p.id === id);
      const pos = calcPos(idx, pages.length, rotationAngle);
      positionCard(el, card, pos.y);
      card.classList.add('visible');

      // Pulse related nodes (all others)
      pages.forEach(p => {
        if (p.id !== id) nodeEls[p.id].classList.add('pulsing');
      });
    }

    function closeAll() {
      if (activeId !== null) {
        nodeEls[activeId].classList.remove('active');
        nodeEls[activeId].querySelector('.node-card').classList.remove('visible');
      }
      pages.forEach(p => nodeEls[p.id].classList.remove('pulsing'));
      activeId   = null;
      autoRotate = true;
    }

    /* click outside closes */
    container.addEventListener('click', closeAll);
    document.getElementById('center-orb').addEventListener('click', e => { e.stopPropagation(); closeAll(); });

    /* ── Card position (above or below node) ─────────── */
    function positionCard(nodeEl, card, posY) {
      if (posY > 0) {
        card.style.top    = 'auto';
        card.style.bottom = '58px';
        card.classList.remove('below');
        card.classList.add('above');
      } else {
        card.style.bottom = 'auto';
        card.style.top    = '58px';
        card.classList.remove('above');
        card.classList.add('below');
      }
    }

    /* ── Calculate node position ─────────────────────── */
    function calcPos(index, total, angle) {
      const deg    = ((index / total) * 360 + angle) % 360;
      const rad    = (deg * Math.PI) / 180;
      const x      = RADIUS * Math.cos(rad);
      const y      = RADIUS * Math.sin(rad);
      const zIndex = Math.round(100 + 50 * Math.cos(rad));
      const opacity = Math.max(0.35, Math.min(1, 0.35 + 0.65 * ((1 + Math.sin(rad)) / 2)));
      return { x, y, zIndex, opacity, rad };
    }

    /* ── Draw connection lines ───────────────────────── */
    function drawConnections(positions) {
      svg.innerHTML = '';
      if (activeId === null) return;

      const cx = container.offsetWidth  / 2;
      const cy = container.offsetHeight / 2;
      const activePos = positions[activeId];
      if (!activePos) return;

      pages.forEach(p => {
        if (p.id === activeId) return;
        const pos = positions[p.id];
        const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
        line.setAttribute('x1', cx + activePos.x);
        line.setAttribute('y1', cy + activePos.y);
        line.setAttribute('x2', cx + pos.x);
        line.setAttribute('y2', cy + pos.y);
        line.setAttribute('stroke', 'rgba(255,255,255,0.08)');
        line.setAttribute('stroke-width', '1');
        line.setAttribute('stroke-dasharray', '4 6');
        svg.appendChild(line);
      });
    }

    /* ── Animation loop ──────────────────────────────── */
    function tick(timestamp) {
      if (lastTime === null) lastTime = timestamp;
      const delta = (timestamp - lastTime) / 1000; // seconds
      lastTime = timestamp;

      if (autoRotate) {
        rotationAngle = (rotationAngle + SPEED_DEG_PER_SEC * delta) % 360;
      }

      const positions = {};

      pages.forEach((page, i) => {
        const pos = calcPos(i, pages.length, rotationAngle);
        positions[page.id] = pos;

        const el = nodeEls[page.id];
        const isActive = activeId === page.id;

        // translate from center (left:50% top:50%) by orbital offset, then back by half node size (~21px)
        el.style.transform = `translate(calc(-50% + ${pos.x}px), calc(-50% + ${pos.y}px))`;
        el.style.zIndex    = isActive ? 200 : pos.zIndex;
        el.style.opacity   = isActive ? 1 : pos.opacity;

        if (isActive) {
          const card = el.querySelector('.node-card');
          if (card.classList.contains('visible')) positionCard(el, card, pos.y);
        }
      });

      drawConnections(positions);
      rafId = requestAnimationFrame(tick);
    }

    rafId = requestAnimationFrame(tick);
  </script>

  <script>
    /* Digital Loom Background */
    (function () {
      const canvas = document.getElementById('loom-bg');
      const ctx = canvas.getContext('2d');
      const THREAD_COLOR = 'rgba(217,70,239,0.5)';
      const BG_COLOR     = '#0a0f1a';
      const THREAD_COUNT = 80;
      let threads = [], animId, width, height;
      function Thread() { this.reset(); }
      Thread.prototype.reset = function () {
        width          = window.innerWidth;
        height         = window.innerHeight;
        this.x         = Math.random() * width;
        this.y         = Math.random() * height;
        this.speed     = Math.random() * 0.5 + 0.1;
        this.amplitude = Math.random() * 20 + 10;
        this.frequency = Math.random() * 0.02 + 0.01;
        this.phase     = Math.random() * Math.PI * 2;
      };
      Thread.prototype.update = function () {
        this.x += this.speed;
        if (this.x > width) { this.x = 0; this.y = Math.random() * height; }
      };
      Thread.prototype.draw = function () {
        const startX = Math.max(this.x - 200, 0);
        ctx.beginPath();
        ctx.moveTo(startX, this.y + Math.sin(startX * this.frequency + this.phase) * this.amplitude);
        for (let i = startX; i < this.x; i++) {
          ctx.lineTo(i, this.y + Math.sin(i * this.frequency + this.phase) * this.amplitude);
        }
        ctx.strokeStyle = THREAD_COLOR;
        ctx.lineWidth   = 0.5;
        ctx.stroke();
      };
      function setup() {
        width = window.innerWidth; height = window.innerHeight;
        canvas.width = width; canvas.height = height;
        threads = Array.from({ length: THREAD_COUNT }, () => new Thread());
        ctx.globalCompositeOperation = 'source-over';
        ctx.fillStyle = BG_COLOR;
        ctx.fillRect(0, 0, width, height);
      }
      function animate() {
        ctx.globalCompositeOperation = 'source-over';
        ctx.fillStyle = 'rgba(0,0,0,0.1)';
        ctx.fillRect(0, 0, width, height);
        ctx.globalCompositeOperation = 'lighter';
        threads.forEach(t => { t.update(); t.draw(); });
        animId = requestAnimationFrame(animate);
      }
      window.addEventListener('resize', setup);
      document.addEventListener('visibilitychange', () => {
        if (document.hidden) cancelAnimationFrame(animId);
        else animate();
      });
      setup(); animate();
    })();
  </script>
</body>
</html>
