<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset — MiniPrints v2</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: #0a0f1a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 2.5rem;
      max-width: 420px;
      width: 90%;
      text-align: center;
    }
    .icon { font-size: 3rem; margin-bottom: 1rem; }
    h1 { font-size: 1.4rem; font-weight: 700; margin-bottom: 0.5rem; }
    p { color: #94a3b8; font-size: 0.9rem; margin-bottom: 1.5rem; line-height: 1.6; }
    .list {
      background: rgba(239,68,68,0.08);
      border: 1px solid rgba(239,68,68,0.2);
      border-radius: 10px;
      padding: 1rem;
      margin-bottom: 1.5rem;
      text-align: left;
    }
    .list span { display: block; font-size: 0.85rem; color: #fca5a5; padding: 2px 0; }
    .keep {
      background: rgba(34,197,94,0.08);
      border: 1px solid rgba(34,197,94,0.2);
      border-radius: 10px;
      padding: 0.75rem 1rem;
      margin-bottom: 1.5rem;
      font-size: 0.85rem;
      color: #86efac;
      text-align: left;
    }
    .btn-reset {
      background: #ef4444;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 0.85rem 2rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      margin-bottom: 0.75rem;
      transition: background 0.2s;
    }
    .btn-reset:hover { background: #dc2626; }
    .btn-back {
      background: transparent;
      color: #94a3b8;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      padding: 0.75rem 2rem;
      font-size: 0.9rem;
      cursor: pointer;
      width: 100%;
      transition: border-color 0.2s;
    }
    .btn-back:hover { border-color: #22c55e; color: #22c55e; }
    .done {
      display: none;
      color: #22c55e;
      font-weight: 600;
      font-size: 1.1rem;
      margin-top: 1rem;
    }
  </style>
</head>
<body>
  <style>
  #loom-bg {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    background: #0a0f1a;
  }
</style>
<canvas id="loom-bg" aria-hidden="true"></canvas>
  <div class="card">
    <div class="icon">⚠️</div>
    <h1>Restablecer datos</h1>
    <p>Esta acción borrará todos los datos operativos. No se puede deshacer.</p>

    <div class="list">
      <span>✗ Ventas</span>
      <span>✗ Cotizaciones</span>
      <span>✗ Stock de piezas</span>
      <span>✗ Historial de impresión</span>
    </div>

    <div class="keep">
      ✓ <strong>Materiales — se conservan</strong>
    </div>

    <button class="btn-reset" onclick="doReset()">Restablecer ahora</button>
    <button class="btn-back" onclick="location.href='index.html'">Cancelar</button>

    <div class="done" id="done">✓ Listo — redirigiendo...</div>
  </div>

  <script>
    function doReset() {
      ['mp_piezas', 'mp_ventas', 'mp_cotizaciones', 'mp_historial'].forEach(k => localStorage.removeItem(k));
      document.querySelector('.btn-reset').disabled = true;
      document.querySelector('.btn-back').disabled = true;
      document.getElementById('done').style.display = 'block';
      setTimeout(() => location.href = 'index.html', 1500);
    }
  </script>

  <script>
    /* Digital Loom Background */
    (function () {
      const canvas = document.getElementById('loom-bg');
      const ctx = canvas.getContext('2d');
      const THREAD_COLOR = 'rgba(217,70,239,0.5)';
      const BG_COLOR     = '#0a0f1a';
      const THREAD_COUNT = 80;
      let threads = [], animId, width, height;
      function Thread() { this.reset(); }
      Thread.prototype.reset = function () {
        width          = window.innerWidth;
        height         = window.innerHeight;
        this.x         = Math.random() * width;
        this.y         = Math.random() * height;
        this.speed     = Math.random() * 0.5 + 0.1;
        this.amplitude = Math.random() * 20 + 10;
        this.frequency = Math.random() * 0.02 + 0.01;
        this.phase     = Math.random() * Math.PI * 2;
      };
      Thread.prototype.update = function () {
        this.x += this.speed;
        if (this.x > width) { this.x = 0; this.y = Math.random() * height; }
      };
      Thread.prototype.draw = function () {
        const startX = Math.max(this.x - 200, 0);
        ctx.beginPath();
        ctx.moveTo(startX, this.y + Math.sin(startX * this.frequency + this.phase) * this.amplitude);
        for (let i = startX; i < this.x; i++) {
          ctx.lineTo(i, this.y + Math.sin(i * this.frequency + this.phase) * this.amplitude);
        }
        ctx.strokeStyle = THREAD_COLOR;
        ctx.lineWidth   = 0.5;
        ctx.stroke();
      };
      function setup() {
        width = window.innerWidth; height = window.innerHeight;
        canvas.width = width; canvas.height = height;
        threads = Array.from({ length: THREAD_COUNT }, () => new Thread());
        ctx.globalCompositeOperation = 'source-over';
        ctx.fillStyle = BG_COLOR;
        ctx.fillRect(0, 0, width, height);
      }
      function animate() {
        ctx.globalCompositeOperation = 'source-over';
        ctx.fillStyle = 'rgba(0,0,0,0.1)';
        ctx.fillRect(0, 0, width, height);
        ctx.globalCompositeOperation = 'lighter';
        threads.forEach(t => { t.update(); t.draw(); });
        animId = requestAnimationFrame(animate);
      }
      window.addEventListener('resize', setup);
      document.addEventListener('visibilitychange', () => {
        if (document.hidden) cancelAnimationFrame(animId);
        else animate();
      });
      setup(); animate();
    })();
  </script>
</body>
</html>
