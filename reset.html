<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset — MiniPrints v2</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: #0a0f1a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 2.5rem;
      max-width: 420px;
      width: 90%;
      text-align: center;
    }
    .icon { font-size: 3rem; margin-bottom: 1rem; }
    h1 { font-size: 1.4rem; font-weight: 700; margin-bottom: 0.5rem; }
    p { color: #94a3b8; font-size: 0.9rem; margin-bottom: 1.5rem; line-height: 1.6; }
    .list {
      background: rgba(239,68,68,0.08);
      border: 1px solid rgba(239,68,68,0.2);
      border-radius: 10px;
      padding: 1rem;
      margin-bottom: 1.5rem;
      text-align: left;
    }
    .list span { display: block; font-size: 0.85rem; color: #fca5a5; padding: 2px 0; }
    .keep {
      background: rgba(34,197,94,0.08);
      border: 1px solid rgba(34,197,94,0.2);
      border-radius: 10px;
      padding: 0.75rem 1rem;
      margin-bottom: 1.5rem;
      font-size: 0.85rem;
      color: #86efac;
      text-align: left;
    }
    .btn-reset {
      background: #ef4444;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 0.85rem 2rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      margin-bottom: 0.75rem;
      transition: background 0.2s;
    }
    .btn-reset:hover { background: #dc2626; }
    .btn-back {
      background: transparent;
      color: #94a3b8;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      padding: 0.75rem 2rem;
      font-size: 0.9rem;
      cursor: pointer;
      width: 100%;
      transition: border-color 0.2s;
    }
    .btn-back:hover { border-color: #22c55e; color: #22c55e; }
    .done {
      display: none;
      color: #22c55e;
      font-weight: 600;
      font-size: 1.1rem;
      margin-top: 1rem;
    }
  </style>
</head>
<body>
  <script type="module" src="firebase-sync.js"></script>
  <div id="shapes-bg" aria-hidden="true">
    <div id="shapes-ambient"></div>
    <div class="es" style="--d:.30s; --r:12deg; left:-5%; top:18%">
      <div class="es-inner" style="width:600px; height:140px"><div class="es-pill es-indigo"></div></div>
    </div>
    <div class="es" style="--d:.50s; --r:-15deg; right:-4%; top:72%">
      <div class="es-inner" style="width:500px; height:120px"><div class="es-pill es-green"></div></div>
    </div>
    <div class="es" style="--d:.40s; --r:-8deg; left:7%; bottom:8%">
      <div class="es-inner" style="width:300px; height:80px"><div class="es-pill es-violet"></div></div>
    </div>
    <div class="es" style="--d:.60s; --r:20deg; right:16%; top:11%">
      <div class="es-inner" style="width:200px; height:60px"><div class="es-pill es-purple"></div></div>
    </div>
    <div class="es" style="--d:.70s; --r:-25deg; left:23%; top:6%">
      <div class="es-inner" style="width:150px; height:40px"><div class="es-pill es-teal"></div></div>
    </div>
    <div id="shapes-vignette"></div>
  </div>
  <style>
  #loom-bg {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    background: #0a0f1a;
    transform: translateZ(0);
    -webkit-transform: translateZ(0);
}'@

    # 2. Replace visibility handler + add pageshow for iOS bfcache
    $oldHandler = @'
      window.addEventListener('resize', setup);
      document.addEventListener('visibilitychange', () => {
        if (document.hidden) cancelAnimationFrame(animId);
        else animate();
      });
      setup(); animate();
</style>
<div class="card">
    <div class="icon">⚠️</div>
    <h1>Restablecer datos</h1>
    <p>Esta acción borrará todos los datos operativos. No se puede deshacer.</p>

    <div class="list">
      <span>✗ Ventas</span>
      <span>✗ Cotizaciones</span>
      <span>✗ Stock de piezas</span>
      <span>✗ Historial de impresión</span>
      <span>✗ Peso de filamentos — restablecido a 1000g c/u</span>
    </div>

    <div class="keep">
      ✓ <strong>Materiales — nombres, precios y tipos se conservan</strong>
    </div>

    <button class="btn-reset" onclick="doReset()">Restablecer ahora</button>
    <button class="btn-back" onclick="location.href='index.html'">Cancelar</button>

    <div class="done" id="done">✓ Listo — redirigiendo...</div>
  </div>

  <script>
    function doReset() {
      ['mp_piezas', 'mp_ventas', 'mp_cotizaciones', 'mp_historial'].forEach(k => localStorage.removeItem(k));
      try {
        const mats = JSON.parse(localStorage.getItem('mp_materials') || '{}');
        Object.values(mats).forEach(m => { m.pesoTotal = 1000; });
        localStorage.setItem('mp_materials', JSON.stringify(mats));
      } catch(e) {}
      document.querySelector('.btn-reset').disabled = true;
      document.querySelector('.btn-back').disabled = true;
      document.getElementById('done').style.display = 'block';
      setTimeout(() => location.href = 'index.html', 1500);
    }
  </script>
  <script src="glass.js"></script>
</body>
</html>
